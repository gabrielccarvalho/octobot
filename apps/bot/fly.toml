# fly.toml app configuration file generated for pr-assistant on 2026-06-17T18:51:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pr-assistant'
primary_region = 'iad'

[build]
  dockerfile = "apps/bot/Dockerfile"

# Non-secret runtime config. Secrets (DISCORD_TOKEN, GITHUB_OAUTH_*,
# TOKEN_ENCRYPTION_KEY, DISCORD_CLIENT_ID) are set via `fly secrets set`.
[env]
  PORT = "8080"                              # must match http_service.internal_port
  DATABASE_PATH = "/data/bot.sqlite"         # on the mounted /data volume
  PUBLIC_BASE_URL = "https://api.octobot.dev" # OAuth callback host: /oauth/callback

[processes]
  app = 'node dist/index.js'

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
